name: BrowserStack App Automate

on:
  workflow_dispatch:
    inputs:
      apk_path:
        description: 'APK 파일 경로 (리포 내 상대경로, 예: app/build/outputs/apk/release/app.apk)'
        required: true
        default: 'app.apk'

jobs:
  browserstack-test:
    name: Run on Samsung Galaxy Tab A7 / Android 16.0
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. 소스 체크아웃 ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 설정 ────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. 의존성 설치 ────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pytest \
            Appium-Python-Client \
            selenium

      # ── 4. APK → BrowserStack 업로드 ─────────────────────
      - name: Upload APK to BrowserStack
        id: bs_upload
        run: |
          RESPONSE=$(curl -s -u "${{ secrets.BROWSERSTACK_USERNAME }}:${{ secrets.BROWSERSTACK_ACCESS_KEY }}" \
            -X POST "https://api-cloud.browserstack.com/app-automate/upload" \
            -F "file=@${{ github.event.inputs.apk_path }}" \
            -F "custom_id=LiteracyApp")

          echo "BrowserStack upload response: $RESPONSE"

          APP_URL=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['app_url'])")
          echo "BROWSERSTACK_APP_URL=$APP_URL" >> $GITHUB_ENV
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT

      # ── 5. pytest 실행 ────────────────────────────────────
      - name: Run Appium tests on BrowserStack
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_APP_URL: ${{ env.BROWSERSTACK_APP_URL }}
          TEST_ID: ${{ secrets.TEST_ID }}
          TEST_PW: ${{ secrets.TEST_PW }}
        run: |
          pytest tests/test_s_all_literacy_flow.py \
            -v -s \
            --tb=short \
            --junitxml=test-results/results.xml

      # ── 6. 결과 아티팩트 저장 ─────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
