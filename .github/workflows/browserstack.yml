name: BrowserStack App Automate

on:
  workflow_dispatch:

jobs:
  browserstack-test:
    name: Run on Samsung Galaxy Tab S11 / Android 16.0
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pytest \
            Appium-Python-Client \
            selenium \
            numpy \
            opencv-python-headless
      
            
      - name: Run Appium tests on BrowserStack
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_APP_URL: ${{ secrets.BROWSERSTACK_APP_URL }}
          TEST_ID: ${{ secrets.TEST_ID }}
          TEST_PW: ${{ secrets.TEST_PW }}
        run: |
          pytest tests/test_s01_login.py \
            -v -s \
            --tb=short \
            --junitxml=test-results/results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14
